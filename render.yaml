services:
  - type: web
    name: campusshield-api
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && gunicorn main:app -w 4 -k uvicorn.workers.UvicornWorker"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: campusshield-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.0
  - type: psql
    name: campusshield-db
    databaseName: campusshield
    user: postgres
    plan: free
